<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模具管理系统</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
      }
      .loading-icon {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loading-icon svg {
        width: 100%;
        height: 100%;
      }
      .loading-text {
        color: #fff;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 2px;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        margin-top: 20px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">
        <div class="loading-icon">
          <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="256" cy="256" r="120" stroke="rgba(255,255,255,0.3)" stroke-width="16" fill="none"/>
            <path d="M256 136 C256 136 300 160 300 200 C300 240 212 240 212 200 C212 160 256 136 256 136Z" fill="rgba(255,255,255,0.9)"/>
            <circle cx="256" cy="256" r="16" fill="rgba(255,255,255,0.9)"/>
            <line x1="256" y1="280" x2="256" y2="380" stroke="rgba(255,255,255,0.9)" stroke-width="12" stroke-linecap="round"/>
            <line x1="216" y1="310" x2="256" y2="280" stroke="rgba(255,255,255,0.9)" stroke-width="12" stroke-linecap="round"/>
            <line x1="296" y1="310" x2="256" y2="280" stroke="rgba(255,255,255,0.9)" stroke-width="12" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="loading-text">模具管理系统</div>
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
